<section class="login-wrapper">
  <div class="overlay"></div>

  <div class="login-card">
    <div class="card-header">
      <h3>Welcome Back</h3>
      <p>Please enter your details to sign in</p>
    </div>

    <form [formGroup]="loginform" class="main-form">
      
      <div class="input-group">
        <label for="username">Username</label>
        <input 
          type="text" 
          formControlName="username" 
          id="username" 
          [class.is-invalid]="loginform.controls['username'].dirty && loginform.hasError('required','username')" 
          placeholder="Enter your username" 
          autocomplete="off">
        
        <small *ngIf="loginform.controls['username'].dirty && loginform.hasError('required','username')" class="text-error">
          Username is required!
        </small>
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          formControlName="password" 
          id="password" 
          [class.is-invalid]="loginform.controls['password'].dirty && loginform.hasError('required','password')" 
          placeholder="Enter your password" 
          autocomplete="off">
        
        <small *ngIf="loginform.controls['password'].dirty && loginform.hasError('required','password')" class="text-error">
          Password is required!
        </small>
      </div>

      <div class="form-actions">
        <a class="forgot-pass" (click)="openForgotPassword()">Forgot Password?</a>
      </div>

      <button (click)="onLogin()" type="submit" class="submit-btn">
        Log In
      </button>

    </form>
  </div>

  <div class="modal-backdrop" *ngIf="showForgotPasswordModal" (click)="closeForgotPassword()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <div class="modal-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
      </div>
      <h4>بازیابی رمز عبور</h4>
      <p>لطفا جهت بازیابی رمز عبور با مدیریت سایت تماس بگیرید.</p>
      <button class="modal-close-btn" (click)="closeForgotPassword()">متوجه شدم</button>
    </div>
  </div>
</section>
