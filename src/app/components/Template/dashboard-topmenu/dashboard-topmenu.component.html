<section class="dashboard-topmenu" id="Dashboard-TopMenu">
  
  <nav class="nav-right">
    <ul>
      <li>
        <div class="profile-container" (click)="toggleProfileMenu()">
          <div class="account">
            <img src="assets/images/user.png" alt="user profile">
            <p>{{getUserName()}}</p>
            <svg style="width: 16px; height: 16px; margin-left: 5px; opacity: 0.7;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
          </div>
          
          <ul class="profile-dropdown glass-panel" [class.show]="isProfileMenuOpen">
            <li>
              <a href="/profile">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2M12 11a4 4 0 0 0 0-8 4 4 0 0 0 0 8z"/></svg>
                Profile
              </a>
            </li>
            <li class="logout-item" (click)="logout()">
              <a href="javascript:void(0)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
                Logout
              </a>
            </li>
          </ul>
        </div>
      </li>
    </ul>
  </nav>

  <div class="motto-container">
    <p class="motto-text">مشتری در جایگاه شریک و واسطه روزی ما با خداوند است</p>
  </div>

  <nav class="nav-left">
    <ul>
      <li><a class="title">{{getTitle()}}</a></li>
    </ul>
  </nav>

</section>
