<section class="dashboard-wrapper">
  <app-dashboard-sidebar></app-dashboard-sidebar>

  <section class="dashboard-main">
    <app-dashboard-topmenu></app-dashboard-topmenu>

    <div class="content-scrollable">
      <div class="profile-grid">
        <section class="glass-card main-info">
          <div class="card-header">
            <h3>اطلاعات حساب کاربری</h3>
          </div>

          <section class="loading-spinner" *ngIf="!flag_profile">
            <mat-spinner diameter="50"></mat-spinner>
          </section>

          <form [formGroup]="profileform" (ngSubmit)="onUpdate()" *ngIf="flag_profile" class="modern-form">
            <div class="form-grid">
              <div class="form-group">
                <label>نام</label>
                <input type="text" formControlName="firstName" placeholder="نام">
              </div>
              <div class="form-group">
                <label>نام خانوادگی</label>
                <input type="text" formControlName="lastName" placeholder="نام خانوادگی">
              </div>
              <div class="form-group">
                <label>ایمیل</label>
                <input type="email" formControlName="email" placeholder="email@example.com">
              </div>
              <div class="form-group">
                <label>تلفن همراه</label>
                <input type="text" formControlName="phoneNumber" placeholder="0912...">
              </div>
              <div class="form-group">
                <label>شهر</label>
                <input type="text" formControlName="city" placeholder="نام شهر">
              </div>
              <div class="form-group">
                <label>کد پستی</label>
                <input type="text" formControlName="postalCode" placeholder="10 رقم">
              </div>
              <div class="form-group full-width">
                <label>آدرس</label>
                <textarea formControlName="address" rows="2" placeholder="آدرس دقیق..."></textarea>
              </div>
              <div class="form-group full-width">
                <label>نام کاربری (غیرقابل تغییر)</label>
                <input type="text" [value]="formData.userName" disabled class="disabled-input">
              </div>
              <div class="form-group full-width">
                <label>تایید هویت (رمز عبور فعلی)</label>
                <input type="password" formControlName="password" placeholder="برای ثبت تغییرات رمز خود را وارد کنید">
                <small *ngIf="profileform.get('password')?.touched && profileform.get('password')?.errors?.['required']" class="error-text">وارد کردن گذرواژه الزامی است!</small>
              </div>
            </div>
            <button type="submit" class="btn-submit" [disabled]="profileform.invalid">ویرایش اطلاعات</button>
          </form>
        </section>

        <section class="glass-card password-card">
          <div class="card-header">
            <h3>تغییر رمز عبور</h3>
          </div>

          <form [formGroup]="changepass_form" (ngSubmit)="onChangePassword()" *ngIf="flag_profile" class="modern-form">
            <div class="form-group">
              <label>رمز عبور فعلی</label>
              <input type="password" formControlName="password" placeholder="Current Password">
            </div>
            <div class="form-group">
              <label>رمز عبور جدید</label>
              <input type="password" formControlName="new_password" placeholder="New Password">
            </div>
            <div class="form-group">
              <label>تکرار رمز عبور جدید</label>
              <input type="password" formControlName="re_password" placeholder="Repeat New Password">
            </div>
            <button type="submit" class="btn-submit secondary" [disabled]="changepass_form.invalid">بروزرسانی رمز عبور</button>
          </form>
        </section>
      </div>
    </div>
  </section>
</section>
